name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "package.json version $PACKAGE_VERSION does not match tag $GITHUB_REF_NAME"
            exit 1
          fi

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Pack CLI artifact
        run: npm pack

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if npm view "@jx-grxf/patchpilot@${GITHUB_REF_NAME#v}" version >/dev/null 2>&1; then
            echo "@jx-grxf/patchpilot@${GITHUB_REF_NAME#v} is already published."
            exit 0
          fi

          PUBLISH_TAG="latest"
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            PUBLISH_TAG="beta"
          fi

          if [ -n "${NODE_AUTH_TOKEN:-}" ]; then
            npm publish --access public --provenance --tag "$PUBLISH_TAG"
          else
            echo "NPM_TOKEN is not configured. Falling back to npm trusted publishing/OIDC."
            npm publish --access public --provenance --tag "$PUBLISH_TAG"
          fi

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          RELEASE_NOTES="docs/releases/${GITHUB_REF_NAME}.md"
          if [ ! -f "$RELEASE_NOTES" ]; then
            echo "Release notes file $RELEASE_NOTES is missing."
            exit 1
          fi
          RELEASE_FLAGS=()
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            RELEASE_FLAGS+=(--prerelease)
          fi

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" --notes-file "$RELEASE_NOTES" "${RELEASE_FLAGS[@]}"
            gh release upload "${GITHUB_REF_NAME}" *.tgz --clobber
          else
            gh release create "${GITHUB_REF_NAME}" --verify-tag --notes-file "$RELEASE_NOTES" "${RELEASE_FLAGS[@]}" *.tgz
          fi
